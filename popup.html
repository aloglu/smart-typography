<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Smart Typography</title>
        <link rel="stylesheet" href="popup.css" />
    </head>
    <body>
        <main class="popup">
            <header class="settings-header">
                <div>
                    <p class="eyebrow">Smart Typography</p>
                    <h1>Type with perfect punctuation</h1>
                    <p class="lede">
                        Enable curly quotes, arrows, em dashes, fractions, and
                        more.
                    </p>
                </div>
            </header>

            <section class="panel" aria-label="Typography settings">
                <label class="setting-row">
                    <span class="setting-copy">
                        <strong>Current site</strong>
                        <span id="site-label" class="setting-value">Loading…</span>
                    </span>
                    <input
                        class="switch-input"
                        type="checkbox"
                        role="switch"
                        id="site-toggle"
                    />
                    <span class="switch" aria-hidden="true"></span>
                </label>

                <label class="setting-row">
                    <span class="setting-copy">
                        <strong>Global status</strong>
                        <span id="global-label" class="setting-value">Enabled</span>
                    </span>
                    <input
                        class="switch-input"
                        type="checkbox"
                        role="switch"
                        id="global-toggle"
                    />
                    <span class="switch" aria-hidden="true"></span>
                </label>
            </section>

            <section class="panel tip-panel" aria-label="Typing tip">
                <p>
                    Tip: prepend a backslash before a quote to insert the
                    straight version (example: <code>\'</code>).
                </p>
            </section>
        </main>
        <script src="popup.js"></script>
    </body>
</html>
